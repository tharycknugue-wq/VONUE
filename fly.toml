# Fly.io — deploy do Vonue via container (usa o Dockerfile da raiz).
# Passos: `fly launch --no-deploy` (escolhe um nome único e ajusta este
# arquivo) → crie Postgres/Redis → `fly secrets set ...` → `fly deploy`.
# Veja DEPLOY.md (Opção C).

app = "vonue-app"
primary_region = "gru" # São Paulo

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[env]
  NODE_ENV = "production"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
